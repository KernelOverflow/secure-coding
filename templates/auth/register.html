{# 닉네임, 로그인 아이디, 비밀번호를 순서대로 받아 새 계정을 만드는 화면이다 #}
{% extends "base.html" %}
{% block content %}
<div class="page-head"><div><p class="eyebrow">Account</p><h1>회원가입</h1></div></div>
<form method="post" class="panel form-panel form-grid">
  {# 숨은 CSRF 토큰은 다른 사이트가 사용자를 대신해 가입 요청을 보내는 것을 막는다 #}
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="field"><label for="nickname">닉네임</label><input id="nickname" name="nickname" minlength="2" maxlength="20" autocomplete="nickname" required><small>한글, 영문, 숫자, 밑줄, 공백 2~20자</small></div>
  <div class="field"><label for="login_id">아이디</label><input id="login_id" name="login_id" minlength="4" maxlength="20" pattern="[a-z0-9_]{4,20}" autocomplete="username" required><small>영문 소문자, 숫자, 밑줄 4~20자</small></div>
  <div class="field"><label for="password">비밀번호</label><input id="password" type="password" name="password" minlength="8" maxlength="128" autocomplete="new-password" required><small>영문, 숫자, 특수문자를 포함한 8자 이상</small></div>
  <button class="button" type="submit">가입하기</button>
</form>
{% endblock %}
