{% extends "base.html" %}
{% block title %}로그인{% endblock %}
{% block content %}
<div class="page-head"><div><p class="eyebrow">Account</p><h1>로그인</h1></div></div>
<form method="post" class="panel form-panel form-grid">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="field"><label for="username">사용자명</label><input id="username" name="username" maxlength="20" autocomplete="username" required></div>
  <div class="field"><label for="password">비밀번호</label><input id="password" type="password" name="password" maxlength="128" autocomplete="current-password" required></div>
  <button class="button" type="submit">로그인</button>
</form>
{% endblock %}
