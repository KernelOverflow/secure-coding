services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      COOKIE_SECURE: "0"
      TRUST_PROXY: "0"
    volumes:
      - market_instance:/app/instance
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

volumes:
  market_instance:
